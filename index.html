<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Microsoft Clarity</title>
  <style>
    body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f3f2f1; }
    h2 { color: #0073ff; }
    a { display: inline-block; margin-top: 16px; padding: 12px 24px; background: #0073ff; color: white; text-decoration: none; border-radius: 6px; font-size: 16px; }
    a:hover { background: #005ecb; }
  </style>
  <script>
    window.onload = function() {
      var url = 'https://clarity.microsoft.com/projects/view/vzpgwxpgmr/gettingstarted?date=Last%203%20days&view=liveRecordings&list=0';
      var w = window.screen.availWidth * 0.85;
      var h = window.screen.availHeight * 0.85;
      var left = (window.screen.availWidth - w) / 2;
      var top = (window.screen.availHeight - h) / 2;
      window.open(url, 'ClarityPopup', 'width=' + w + ',height=' + h + ',top=' + top + ',left=' + left + ',resizable=yes,scrollbars=yes,toolbar=no,menubar=no,location=no,status=no');
    };
  </script>
</head>
<body>
  <h2>Microsoft Clarity</h2>
  <p>Abriendo Clarity...</p>
  <a href="https://clarity.microsoft.com/projects/view/vzpgwxpgmr/gettingstarted?date=Last%203%20days&view=liveRecordings&list=0" target="ClarityPopup" onclick="window.open(this.href,'ClarityPopup','width=1280,height=800,resizable=yes,scrollbars=yes,toolbar=no,menubar=no,location=no,status=no');return false;">Abrir Clarity</a>
</body>
</html>
